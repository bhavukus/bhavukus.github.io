name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    
permissions:
  contents: read
  pages: write
  id-token: write
  
concurrency:
  group: "pages"
  cancel-in-progress: true
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      
      # This lists your output directories so we can see exactly where the files went if it fails again
      - run: ls -la
      - run: ls -la .output || echo "No .output folder found"
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public
          
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
